name: Pylint Code Quality

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint

    - name: Run pylint and show score
      run: |
        pylint $(git ls-files '*.py') --score=y | tee pylint-report.txt
        echo "------ FINAL SCORE ------"
        grep "rated at" pylint-report.txt

    - name: Fail if score is low
      run: |
        SCORE=$(grep -oP 'rated at \K[0-9.]+' pylint-report.txt)
        echo "Score is $SCORE"
        MIN_SCORE=8.0

        awk "BEGIN {exit !($SCORE < $MIN_SCORE)}" && {
          echo "❌ Code quality below $MIN_SCORE"
          exit 1
        } || echo "✅ Code quality is acceptable"
